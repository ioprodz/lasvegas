<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Vegas LED Controller</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0d1a;
            color: #eee;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
        }
        nav h1 {
            font-size: 1.2rem;
            margin-right: 2rem;
        }
        nav button {
            padding: 0.5rem 1.2rem;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        nav button.active {
            background: #2d2d5e;
            color: #fff;
            border-color: #5555aa;
        }
        nav button:hover { border-color: #5555aa; color: #ccc; }
        #status {
            margin-left: auto;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .connected { background: #2d6a4f; }
        .disconnected { background: #6a2d2d; }

        /* Pages */
        .page { display: none; padding: 2rem; }
        .page.active { display: block; }

        /* LED Grid */
        .grid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1rem;
        }
        .grid-label { color: #666; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(60, 8px);
            gap: 1px;
            padding: 1rem;
            background: #111;
            border-radius: 8px;
        }
        .led {
            width: 8px;
            height: 8px;
            background: #1a1a1a;
            border-radius: 50%;
        }

        /* Animation controls */
        .animation-list {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .anim-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 1.5rem;
            width: 220px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .anim-card:hover { border-color: #5555aa; }
        .anim-card.running {
            border-color: #4ecdc4;
            box-shadow: 0 0 12px rgba(78, 205, 196, 0.2);
        }
        .anim-card h3 { margin-bottom: 0.5rem; font-size: 1rem; }
        .anim-card p { color: #888; font-size: 0.85rem; line-height: 1.4; }
        .anim-card .badge {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.75rem;
            background: #2d6a4f;
            color: #aaffcc;
        }

        .stop-btn {
            padding: 0.6rem 2rem;
            background: #6a2d2d;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .stop-btn:hover { background: #8a3d3d; }
        .stop-btn:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>
    <nav>
        <h1>Las Vegas</h1>
        <button class="nav-btn active" data-page="animations">Animations</button>
        <div id="status" class="disconnected">Disconnected</div>
    </nav>

    <!-- Animations Page -->
    <div id="page-animations" class="page active">
        <h2 style="margin-bottom: 1rem;">Animations</h2>
        <div class="animation-list">
            <div class="anim-card" data-anim="rainbow">
                <h3>Rainbow Cycle</h3>
                <p>Smooth rotating rainbow across all LEDs. Full spectrum.</p>
            </div>
            <div class="anim-card" data-anim="pulse">
                <h3>Pulse</h3>
                <p>Warm white breathing effect. Gentle fade in and out.</p>
            </div>
            <div class="anim-card" data-anim="chase">
                <h3>Color Chase</h3>
                <p>Cyan light segment chasing around the strip.</p>
            </div>
        </div>
        <button class="stop-btn" id="stop-btn" disabled>Stop Animation</button>

        <div class="grid-container">
            <div class="grid-label">LED Grid (60 x 6 = 360 LEDs)</div>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <script>
        // --- Navigation ---
        const navButtons = document.querySelectorAll('.nav-btn');
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                navButtons.forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('page-' + btn.dataset.page).classList.add('active');
            });
        });

        // --- LED Grid ---
        const grid = document.getElementById('grid');
        const leds = [];
        for (let i = 0; i < 360; i++) {
            const led = document.createElement('div');
            led.className = 'led';
            grid.appendChild(led);
            leds.push(led);
        }

        function updateGrid(data) {
            // data: Uint8Array of [r, g, b, r, g, b, ...]
            for (let i = 0; i < 360 && i * 3 + 2 < data.length; i++) {
                const r = data[i * 3];
                const g = data[i * 3 + 1];
                const b = data[i * 3 + 2];
                leds[i].style.background = `rgb(${r},${g},${b})`;
            }
        }

        // --- Animation controls ---
        const animCards = document.querySelectorAll('.anim-card');
        const stopBtn = document.getElementById('stop-btn');
        let currentAnim = null;

        function setActiveAnim(name) {
            currentAnim = name;
            animCards.forEach(card => {
                card.classList.toggle('running', card.dataset.anim === name);
                const badge = card.querySelector('.badge');
                if (badge) badge.remove();
                if (card.dataset.anim === name) {
                    const b = document.createElement('span');
                    b.className = 'badge';
                    b.textContent = 'Running';
                    card.appendChild(b);
                }
            });
            stopBtn.disabled = !name;
        }

        animCards.forEach(card => {
            card.addEventListener('click', () => {
                const name = card.dataset.anim;
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send('animate:' + name);
                    setActiveAnim(name);
                }
            });
        });

        stopBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('stop');
                setActiveAnim(null);
            }
        });

        // --- WebSocket ---
        const statusEl = document.getElementById('status');
        let ws;

        function connect() {
            const host = window.location.hostname;
            ws = new WebSocket(`ws://${host}:8080`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'disconnected';
                currentAnim = null;
                setActiveAnim(null);
                setTimeout(connect, 2000);
            };

            ws.onmessage = (event) => {
                if (event.data instanceof ArrayBuffer) {
                    updateGrid(new Uint8Array(event.data));
                }
            };
        }

        connect();
    </script>
</body>
</html>
